<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f8fafc;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:#ffffff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:24px;text-align:center;background-color:#ffffff;border-bottom:1px solid #e2e8f0;">
              <img src="{{ .Logo }}" alt="CWClock" height="36" style="height:36px;">
            </td>
          </tr>
          <tr>
            <td style="padding:32px;color:#0f172a;font-size:15px;line-height:1.6;">
              {{ .Body }}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px;color:#64748b;font-size:12px;text-align:center;border-top:1px solid #e2e8f0;">
              &copy; <a href="https://www.cwcloud.tech" style="text-decoration:none;">CWCloud</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
